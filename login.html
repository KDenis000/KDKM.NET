<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDKM.NET - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925') no-repeat center center/cover; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        .login-card { background: rgba(0, 0, 0, 0.85); padding: 60px; border-radius: 8px; width: 100%; max-width: 450px; }
        .login-card h2 { margin-bottom: 25px; font-size: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 14px; background: #333; border: none; border-radius: 4px; color: white; font-size: 16px; }
        .btn-submit { width: 100%; padding: 14px; background: #e50914; border: none; border-radius: 4px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-submit:hover { background: #b80710; }
        .extra-links { display: flex; justify-content: space-between; margin-top: 15px; font-size: 14px; color: #b3b3b3; }
        .extra-links a { color: #fff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Sign In</h2>
        <form action="index.html">
            <div class="form-group">
                <input type="email" placeholder="Email or phone number" required>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
            <div class="extra-links">
                <label><input type="checkbox"> Remember me</label>
                <a href="index.html">Back to Home</a>
            </div>
        </form>
    </div>

</body>
</html>
