<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KDK M.NET | Unlimited Movies & TV Shows</title>

<link rel="icon" href="images/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
scroll-behavior:smooth;
}

body{

background:#080808;
color:white;
overflow-x:hidden;

}

body::-webkit-scrollbar{

width:10px;

}

body::-webkit-scrollbar-thumb{

background:#e50914;
border-radius:20px;

}

body::-webkit-scrollbar-track{

background:#111;

}

header{

position:fixed;
top:0;
left:0;
width:100%;
height:75px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
z-index:99999;

background:linear-gradient(to bottom,#000,transparent);

transition:.4s;

}

header.scrolled{

background:#000;

}

.logo{

display:flex;
align-items:center;
gap:15px;

}

.logo img{

height:55px;

}

.logo h1{

font-size:30px;
font-weight:800;
letter-spacing:2px;
color:#FFD700;

}

nav{

display:flex;
gap:25px;

}

nav a{

text-decoration:none;
color:white;
font-size:15px;
transition:.4s;

}

nav a:hover{

color:#e50914;

}

.right{

display:flex;
align-items:center;
gap:15px;

}

.search{

width:260px;
height:45px;
background:#161616;
border-radius:40px;
display:flex;
align-items:center;
padding:0 20px;

}

.search i{

color:#888;

}

.search input{

background:none;
border:none;
outline:none;
width:100%;
padding-left:15px;
color:white;
font-size:15px;

}

.signin{

padding:11px 25px;
background:#e50914;
border:none;
border-radius:30px;
color:white;
cursor:pointer;
font-weight:600;

}

.hero{

height:100vh;
display:flex;
align-items:center;
padding-left:80px;

background:

linear-gradient(to right,#000 15%,transparent),

url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920") center/cover;

}

.hero-content{

max-width:650px;

}

.hero h2{

font-size:70px;
font-weight:800;
line-height:75px;

}

.hero p{

margin-top:20px;
color:#ddd;
font-size:18px;
line-height:32px;

}

.hero-buttons{

display:flex;
gap:20px;
margin-top:35px;

}

.play{

padding:18px 40px;
background:white;
border:none;
border-radius:40px;
font-size:18px;
font-weight:700;
cursor:pointer;

}

.more{

padding:18px 40px;
background:rgba(255,255,255,.2);
border:none;
border-radius:40px;
color:white;
font-size:18px;
backdrop-filter:blur(20px);

}

section{

padding:70px;

}

.title{

font-size:35px;
margin-bottom:25px;

}

.movies{

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(220px,1fr));

gap:25px;

}

.card{

position:relative;
height:330px;
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:.5s;

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

.card:hover{

transform:scale(1.07);

}

.overlay{

position:absolute;
bottom:0;
left:0;
width:100%;
padding:20px;

background:

linear-gradient(transparent,#000);

}

.overlay h3{

font-size:20px;

}

.overlay p{

color:#ccc;

}

.rating{

color:gold;

margin-top:5px;

}

.slider{

display:flex;
overflow:auto;
gap:20px;

}

.slider::-webkit-scrollbar{

display:none;

}

footer{

padding:80px;
background:#050505;

text-align:center;

color:#777;

margin-top:80px;

}

@media(max-width:900px){

header{

padding:20px;

}

nav{

display:none;

}

.hero{

padding:30px;

}

.hero h2{

font-size:45px;
line-height:50px;

}

.search{

display:none;

}

}

</style>

</head>

<body>

<header id="header">

<div class="logo">

<img src="images/logo.png">

<h1>KDK M.NET</h1>

</div>

<nav>

<a href="#">Home</a>

<a href="#">Movies</a>

<a href="#">TV Shows</a>

<a href="#">Series</a>

<a href="#">Live TV</a>

<a href="#">Anime</a>

<a href="#">Trending</a>

<a href="#">My List</a>

</nav>

<div class="right">

<div class="search">

<i class="fas fa-search"></i>

<input
type="text"
placeholder="Search Movies...">

</div>

<button class="signin">

Sign In

</button>

</div>

</header>

<section class="hero">

<div class="hero-content">

<h2>

Unlimited Movies,<br>

TV Shows<br>

and More

</h2>

<p>

Watch thousands of movies from around the world on KDK M.NET.
Enjoy action, comedy, anime, documentaries, TV shows, and much more in one place.

</p>

<div class="hero-buttons">

<button class="play">

<i class="fas fa-play"></i>

Play

</button>

<button class="more">

<i class="fas fa-circle-info"></i>

More Info

</button>

</div>

</div>

</section>
