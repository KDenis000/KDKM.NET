<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDKM.NET - Contact Us</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #111; color: #fff; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 6%; background: #000; }
        .logo { font-size: 28px; font-weight: bold; color: #e50914; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        
        .contact-container { max-width: 600px; margin: 60px auto; padding: 30px; background: #222; border-radius: 8px; }
        .contact-container h2 { margin-bottom: 20px; text-align: center; }
        .form-input { width: 100%; padding: 12px; background: #333; border: none; color: white; margin-bottom: 15px; border-radius: 4px; font-size: 16px; }
        textarea.form-input { height: 150px; resize: none; }
        .btn-send { background: #e50914; color: white; width: 100%; padding: 12px; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-send:hover { background: #b80710; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">KDKM.NET</div>
        <ul class="nav-links">
            <li><a href="index.html" style="color:#fff; text-decoration:none;">Home</a></li>
            <li><a href="movies.html" style="color:#fff; text-decoration:none;">Movies</a></li>
            <li><a href="contact.html" style="color: #e50914; text-decoration:none;">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <h2>Contact Support / Request Movies</h2>
        <form id="contactForm">
            <input type="text" class="form-input" placeholder="Your Name" required>
            <input type="email" class="form-input" placeholder="Your Email Address" required>
            <textarea class="form-input" placeholder="Write your movie request or message here..." required></textarea>
            <button type="submit" class="btn-send">Send Message</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
