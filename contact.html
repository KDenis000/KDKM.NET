<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDKM.NET - Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #111; color: #fff; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 6%; background: #000; }
        .logo { font-size: 28px; font-weight: bold; color: #e50914; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .menu-toggle { display: none; font-size: 24px; cursor: pointer; }
        
        .contact-container { max-width: 600px; margin: 60px auto; padding: 40px 30px; background: #181818; border-radius: 8px; border: 1px solid #222; }
        .contact-container h2 { margin-bottom: 10px; text-align: center; font-size: 28px; }
        .contact-container p { text-align: center; color: #888; margin-bottom: 30px; font-size: 15px; }
        .form-input { width: 100%; padding: 14px; background: #282828; border: 1px solid #333; color: white; margin-bottom: 20px; border-radius: 4px; font-size: 16px; outline: none; }
        .form-input:focus { border-color: #e50914; }
        textarea.form-input { height: 140px; resize: none; }
        .btn-send { background: #e50914; color: white; width: 100%; padding: 14px; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-send:hover { background: #b80710; }

        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 70px; left: 0; width: 100%; background: #000; padding: 20px; gap: 15px; text-align: center; z-index: 1000; }
            .nav-links.active { display: flex; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">KDKM.NET</div>
        <div class="menu-toggle" id="mobileMenu"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="movies.html">Movies</a></li>
            <li><a href="contact.html" style="color: #e50914;">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <h2>Get In Touch</h2>
        <p>Have file errors or request options? Leave a ticket below.</p>
        <form id="contactForm">
            <input type="text" class="form-input" placeholder="Name" required>
            <input type="email" class="form-input" placeholder="Email Address" required>
            <textarea class="form-input" placeholder="Type message or file details here..." required></textarea>
            <button type="submit" class="btn-send">Submit Message</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
